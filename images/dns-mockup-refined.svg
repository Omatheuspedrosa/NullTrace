<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SECURE DNS ROUTING VISUALIZATION</title>
  <desc id="desc">Visualização técnica do fluxo de DNS seguro com Quad9: usuário, consulta DNS criptografada, cluster DNS Quad9, consulta recursiva, servidores root e resposta segura.</desc>
  <defs>
