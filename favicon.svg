<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NullTrace favicon</title>
  <desc id="desc">Favicon do NullTrace com escudo minimalista e trilha luminosa interna.</desc>
  <defs>
    <linearGradient id="bg" x1="20" y1="20" x2="236" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141C2C"/>
      <stop offset="1" stop-color="#0A101A"/>
    </linearGradient>
    <linearGradient id="stroke" x1="64" y1="46" x2="190" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5AC8FA"/>
      <stop offset="1" stop-color="#7C90FF"/>
    </linearGradient>
    <linearGradient id="trace" x1="92" y1="78" x2="164" y2="176" gradientUnits="userSpaceOnUse">
