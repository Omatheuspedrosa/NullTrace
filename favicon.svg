    <path d="M96 84V164L128 122L160 164V84" fill="none" stroke="url(#trace)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="96" cy="84" r="6" fill="#8DE7FF"/>
